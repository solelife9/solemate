<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #111; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; font-family: sans-serif; }
  .logo-box { background: #1a1a1a; border-radius: 20px; padding: 30px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { color: #888; font-size: 13px; }
</style>
</head>
<body>

<!-- 로고 1: K + 속도선 -->
<div class="logo-box">
  <svg width="120" height="120" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="55" fill="#FF6500"/>
    <text x="38" y="80" font-family="Arial Black" font-weight="900" font-size="62" fill="white">K</text>
    <line x1="72" y1="38" x2="95" y2="38" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="76" y1="52" x2="99" y2="52" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
    <line x1="80" y1="66" x2="103" y2="66" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  </svg>
  <span class="label">① K + 속도선</span>
</div>

<!-- 로고 2: KEEGO 워드마크 -->
<div class="logo-box">
  <svg width="200" height="80" viewBox="0 0 200 80">
    <rect width="200" height="80" rx="16" fill="#FF6500"/>
    <text x="16" y="56" font-family="Arial Black" font-weight="900" font-size="48" fill="white" letter-spacing="2">KEEGO</text>
  </svg>
  <span class="label">② 워드마크</span>
</div>

<!-- 로고 3: 신발 + K -->
<div class="logo-box">
  <svg width="140" height="100" viewBox="0 0 140 100">
    <!-- 신발 실루엣 -->
    <path d="M10 75 Q30 40 60 45 Q90 50 120 42 Q130 40 132 50 Q134 60 120 65 Q90 72 60 70 Q30 68 10 75Z"
          fill="#FF6500"/>
    <!-- 신발 안창 -->
    <path d="M10 75 Q15 80 30 78 Q70 74 120 65 Q130 63 132 55 Q125 75 70 80 Q30 82 10 75Z"
          fill="#cc5200"/>
    <!-- K 글자 -->
    <text x="42" y="68" font-family="Arial Black" font-weight="900" font-size="36" fill="white">K</text>
  </svg>
  <span class="label">③ 신발 + K</span>
</div>

<!-- 로고 4: 원형 배지 -->
<div class="logo-box">
  <svg width="120" height="120" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#FF6500" stroke-width="6"/>
    <circle cx="60" cy="60" r="44" fill="#FF6500"/>
    <text x="32" y="75" font-family="Arial Black" font-weight="900" font-size="52" fill="white">K</text>
    <text x="10" y="108" font-family="Arial" font-size="11" fill="#FF6500" letter-spacing="6">KEEGO</text>
  </svg>
  <span class="label">④ 원형 배지</span>
</div>

<!-- 로고 5: 미니멀 타이포 -->
<div class="logo-box">
  <svg width="180" height="90" viewBox="0 0 180 90">
    <text x="10" y="60" font-family="Arial Black" font-weight="900" font-size="58" fill="#FF6500">KEE</text>
    <text x="108" y="60" font-family="Arial Black" font-weight="900" font-size="58" fill="white">GO</text>
    <line x1="10" y1="70" x2="170" y2="70" stroke="#FF6500" stroke-width="3"/>
    <text x="10" y="85" font-family="Arial" font-size="11" fill="#888" letter-spacing="3">KEEP GOING</text>
  </svg>
  <span class="label">⑤ 미니멀 타이포</span>
</div>

<!-- 로고 6: 번개 K -->
<div class="logo-box">
  <svg width="120" height="120" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="55" fill="#111"/>
    <circle cx="60" cy="60" r="55" fill="none" stroke="#FF6500" stroke-width="4"/>
    <!-- 번개 -->
    <polygon points="68,15 45,58 62,58 52,105 82,52 63,52" fill="#FF6500"/>
  </svg>
  <span class="label">⑥ 번개 (킵고잉 에너지)</span>
</div>

</body>
</html>
