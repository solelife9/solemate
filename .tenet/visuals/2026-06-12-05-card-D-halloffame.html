<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Retirement Card D · Hall of Fame</title>
<style>
  :root{--accent:#FF6500;--gold:#FFD700;--t3:#9C9CA3;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:30px;font-variant-numeric:tabular-nums;}
  .card{width:360px;height:360px;border-radius:24px;overflow:hidden;position:relative;color:#fff;
    background:radial-gradient(circle at 50% -10%,#241a08 0%,#0A0A0A 60%);
    box-shadow:0 24px 70px rgba(255,215,0,.12);}
  .frame{position:absolute;inset:13px;border:1.5px solid rgba(255,215,0,.5);border-radius:16px;}
  .frame::before{content:"";position:absolute;inset:5px;border:1px solid rgba(255,101,0,.3);border-radius:12px;}
  .inner{position:absolute;inset:0;padding:34px 30px 28px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .retired{font-size:13px;font-weight:900;letter-spacing:.42em;color:var(--gold);text-transform:uppercase;}
  .laurel{font-size:13px;color:var(--gold);margin-top:2px;letter-spacing:.3em;}
  .shoe{font-size:30px;margin-top:14px;}
  .model{font-size:24px;font-weight:800;letter-spacing:-.01em;margin-top:8px;}
  .km{font-size:40px;font-weight:900;letter-spacing:-.02em;margin-top:8px;
    background:linear-gradient(90deg,#FFD700,#FF6500);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .km small{font-size:18px;}
  .stats{display:flex;gap:20px;margin-top:16px;}
  .stats div .v{font-size:18px;font-weight:800;}
  .stats div .v.acc{color:var(--gold);}
  .stats div .k{font-size:9px;letter-spacing:.13em;color:var(--t3);margin-top:4px;text-transform:uppercase;}
  .score{margin-top:18px;display:inline-flex;align-items:center;gap:9px;
    background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.45);padding:7px 16px;border-radius:999px;}
  .score .lab{font-size:10px;letter-spacing:.16em;color:var(--gold);font-weight:700;text-transform:uppercase;}
  .score .num{font-size:18px;font-weight:900;color:#fff;}
  .seal{margin-top:auto;font-size:11px;font-weight:800;letter-spacing:.22em;color:var(--t3);}
  .seal b{color:var(--gold);}
  .wm{margin-top:9px;font-size:10.5px;font-weight:800;letter-spacing:.36em;color:#fff;}
</style>
</head>
<body>
<div class="card">
  <div class="frame"></div>
  <div class="inner">
    <div class="retired">Retired</div>
    <div class="laurel">🌿 &nbsp;★&nbsp; 🌿</div>
    <div class="shoe">👟</div>
    <div class="model">Alphafly 3</div>
    <div class="km">512<small>km</small></div>
    <div class="stats">
      <div><div class="v">42</div><div class="k">Runs</div></div>
      <div><div class="v acc">×3</div><div class="k">PB</div></div>
    </div>
    <div class="score">
      <span class="lab">Shoe Score</span><span class="num">98</span>
    </div>
    <div class="seal">CLASS OF <b>2026</b></div>
    <div class="wm">KEEGO</div>
  </div>
</div>
</body>
</html>
