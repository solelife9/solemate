<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slice D · Home</title>
<style>
  :root{--bg:#0A0A0A;--card:#141414;--accent:#FF6500;--t1:#fff;--t2:#EBEBF5;--t3:#9C9CA3;--line:#242424;--dia:#3B82F6;--gold:#FFD700;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#000;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;display:flex;justify-content:center;padding:32px 0;min-height:100vh;}
  .phone{width:390px;background:var(--bg);border-radius:44px;overflow:hidden;border:1px solid #1c1c1c;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .notch{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:var(--t2);font-size:13px;font-weight:600;}
  .slabel{margin:0 18px 10px;font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
  .scroll{padding:2px 18px 30px;color:var(--t1);}

  .greet{display:flex;align-items:center;justify-content:space-between;margin:4px 4px 16px}
  .greet .hi{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .greet .hi small{display:block;font-size:12px;color:var(--t3);font-weight:500;margin-top:3px}
  /* compact rank chip + title (NEW) */
  .rankmini{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .rchip{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.16);border:1px solid rgba(59,130,246,.5);color:#bcd3ff;padding:5px 11px;border-radius:999px;font-size:12px;font-weight:700}
  .tpill{display:inline-flex;align-items:center;gap:5px;background:rgba(20,184,166,.14);border:1px solid rgba(20,184,166,.45);color:#7fe3d6;padding:3px 10px;border-radius:999px;font-size:10.5px;font-weight:600}

  /* shoe-first hero (kept) */
  .hero{background:linear-gradient(160deg,#17181b,#101012);border:1px solid #20242b;border-radius:24px;padding:20px;position:relative;overflow:hidden}
  .hero .lab{font-size:10.5px;font-weight:800;letter-spacing:.12em;color:var(--accent);text-transform:uppercase}
  .hero .shoe{font-size:46px;text-align:center;margin:4px 0}
  .hero .nm{font-size:20px;font-weight:800;text-align:center}
  .hero .meta{text-align:center;font-size:12px;color:var(--t3);margin-top:3px}
  .hero .gauge{margin-top:16px}
  .hero .gauge .row{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:6px}
  .hero .gauge .track{height:8px;background:#222;border-radius:99px;overflow:hidden}
  .hero .gauge .fill{height:100%;width:64%;border-radius:99px;background:linear-gradient(90deg,#FF6500,#ff9a4d)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
  .mod{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px}
  .mod .t{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;display:flex;align-items:center;gap:6px}
  /* current challenge (NEW) */
  .mod.ch .h{font-size:14px;font-weight:700;margin-top:9px}
  .mod.ch .track{height:7px;background:#222;border-radius:99px;overflow:hidden;margin-top:11px}
  .mod.ch .fill{height:100%;width:62%;border-radius:99px;background:linear-gradient(90deg,#3B82F6,#9333EA)}
  .mod.ch .v{font-size:11px;color:var(--t3);margin-top:7px}
  .mod.ch .v b{color:var(--t2)}
  /* recent achievement (NEW) */
  .mod.ach .h{font-size:14px;font-weight:700;margin-top:9px;display:flex;align-items:center;gap:7px}
  .mod.ach .when{font-size:10.5px;color:var(--t3);margin-top:6px}
  .mod.ach .rar{display:inline-block;margin-top:9px;font-size:9px;font-weight:800;padding:2px 8px;border-radius:6px;background:rgba(255,215,0,.15);color:var(--gold)}

  .quick{display:flex;gap:11px;margin-top:14px}
  .quick button{flex:1;padding:15px 0;border-radius:16px;font-size:14px;font-weight:700;border:none;font-family:inherit;background:var(--card);color:#fff;border:1px solid var(--line)}
  .quick button.run{background:var(--accent);color:#0A0A0A;border:none}
  .note{margin:16px 6px 0;font-size:10.5px;color:#555;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"><span>9:41</span><span>📶 􀙇</span></div>
  <div class="slabel">Slice D — Home Integration</div>
  <div class="scroll">
    <div class="greet">
      <div class="hi">안녕하세요, 민준님<small>오늘도 좋은 러닝 되세요</small></div>
      <div class="rankmini">
        <span class="rchip">💎 Diamond</span>
        <span class="tpill">🏅 Rotation Master</span>
      </div>
    </div>

    <!-- shoe-first hero kept -->
    <div class="hero">
      <div class="lab">최근 신은 신발</div>
      <div class="shoe">👟</div>
      <div class="nm">Alphafly 3</div>
      <div class="meta">512km · 권장 수명 임박</div>
      <div class="gauge">
        <div class="row"><span>수명</span><span>512 / 800km</span></div>
        <div class="track"><div class="fill"></div></div>
      </div>
    </div>

    <div class="grid2">
      <div class="mod ch">
        <div class="t">🎯 진행중 챌린지</div>
        <div class="h">100km 달리기</div>
        <div class="track"><div class="fill"></div></div>
        <div class="v"><b>62</b> / 100km · D-18</div>
      </div>
      <div class="mod ach">
        <div class="t">🏅 최근 업적</div>
        <div class="h">🛡️ Trusted Partner</div>
        <div class="when">2일 전 달성</div>
        <span class="rar">GOLD · +50P</span>
      </div>
    </div>

    <div class="quick">
      <button class="run">러닝 시작</button>
      <button>신발 등록</button>
    </div>
    <div class="note">홈에 rank chip · 장착 타이틀 · 현재 챌린지 · 최근 업적을 자연스럽게 노출 (히어로는 shoe-first 유지)</div>
  </div>
</div>
</body>
</html>
